name: figma_tokens_builder
description: >-
  A build_runner code generator that converts Figma design token JSON files
  (W3C format) into type-safe Dart ThemeExtension classes with multi-mode
  presets, BuildContext extensions, and responsive theming support for Flutter.
version: 0.0.3
homepage: https://github.com/hautvfami/figma_tokens_builder
repository: https://github.com/hautvfami/figma_tokens_builder
issue_tracker: https://github.com/hautvfami/figma_tokens_builder/issues

topics:
  - figma
  - tokens
  - builder
  - theme
  - variables

environment:
  sdk: ^3.8.1

dependencies:
  build: ^2.4.0
  glob: ^2.1.0

dev_dependencies:
  test: ^1.24.0
